name: Deploy to Hostinger

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          echo "Calling deploy webhook..."
          HTTP=$(curl -s -o /tmp/deploy.log -w "%{http_code}" \
            "${{ secrets.DEPLOY_WEBHOOK_URL }}?secret=${{ secrets.DEPLOY_SECRET }}")
          echo "--- Server output ---"
          cat /tmp/deploy.log
          echo "--- HTTP status: $HTTP ---"
          if [ "$HTTP" != "200" ]; then
            echo "Deployment failed (HTTP $HTTP)"
            exit 1
          fi

name: Deploy to Hostinger

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/u805153547/domains/revelplatforms.com/public_html/agritrac

            # Use PHP 8.3 explicitly (Hostinger shared hosting)
            PHP=$(command -v php8.3 || command -v php83 || command -v php)
            echo "Using PHP: $PHP ($($PHP -r 'echo PHP_VERSION;'))"

            # Pull latest code
            git pull origin master

            # Install/update PHP dependencies
            $PHP $(command -v composer) install --no-dev --optimize-autoloader --no-interaction

            # Run any pending migrations
            $PHP artisan migrate --force

            # Clear and rebuild caches
            $PHP artisan config:clear
            $PHP artisan route:clear
            $PHP artisan view:clear
            $PHP artisan config:cache
            $PHP artisan route:cache
            $PHP artisan view:cache

            echo "Deployment complete."
